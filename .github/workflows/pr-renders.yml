name: PR render preview

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  render-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # --- Render with PR branch code ---
      - name: Install (PR branch)
        run: pip install -e ".[docs]"

      - name: Render gallery (PR branch)
        run: python scripts/build_gallery.py --debug

      - name: Save PR renders
        run: |
          mkdir -p /tmp/pr_renders
          cp docs/assets/renders/*.svg docs/assets/renders/manifest.json /tmp/pr_renders/

      # --- Render with base branch code ---
      - name: Clean renders before base render
        run: rm -f docs/assets/renders/*.svg

      - name: Checkout base branch
        run: git checkout ${{ github.event.pull_request.base.sha }}

      - name: Install (base branch)
        run: pip install -e ".[docs]"

      - name: Render gallery (base branch)
        run: python scripts/build_gallery.py --debug

      - name: Save base renders
        run: |
          mkdir -p /tmp/base_renders
          cp docs/assets/renders/*.svg /tmp/base_renders/
          cp docs/assets/renders/manifest.json /tmp/base_renders/ 2>/dev/null || true

      # --- Generate diff ---
      - name: Checkout PR branch (for diff script)
        run: git checkout ${{ github.event.pull_request.head.sha }}

      - name: Install (PR branch, for diff script)
        run: pip install -e ".[docs]"

      - name: Generate render diff
        id: diff
        run: |
          set +e
          python scripts/build_render_diff.py \
            /tmp/base_renders /tmp/pr_renders /tmp/diff_site \
            --pr ${{ github.event.number }}
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -eq 0 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          elif [ $EXIT_CODE -eq 2 ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            exit $EXIT_CODE
          fi

      # A fork PR's GITHUB_TOKEN is read-only, so this job cannot deploy Pages or
      # comment. Hand the site plus the publish decision to pr-render-publish.yml,
      # which runs from the base repo with a write token via workflow_run.
      - name: Stage preview metadata
        run: |
          mkdir -p /tmp/diff_site /tmp/preview_meta
          echo "${{ github.event.number }}" > /tmp/preview_meta/pr_number.txt
          echo "${{ steps.diff.outputs.has_changes }}" > /tmp/preview_meta/has_changes.txt

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: render-preview
          path: |
            /tmp/diff_site
            /tmp/preview_meta
          retention-days: 3
