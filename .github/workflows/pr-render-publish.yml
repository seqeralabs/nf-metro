name: Publish render preview

on:
  workflow_run:
    workflows: ["PR render preview"]
    types: [requested, completed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  pending:
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.action == 'requested'
    steps:
      - name: Resolve PR number from head SHA
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=$(gh api --paginate \
            "repos/${{ github.repository }}/pulls?state=open&per_page=100" \
            --jq ".[] | select(.head.sha == \"${{ github.event.workflow_run.head_sha }}\") | .number" \
            | head -n1)
          echo "number=$PR" >> "$GITHUB_OUTPUT"

      - name: Mark preview as rendering
        if: steps.pr.outputs.number != ''
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2
        with:
          header: render-preview
          number: ${{ steps.pr.outputs.number }}
          message: |
            **Render preview**: :hourglass_flowing_sand: rendering in progress...

  publish:
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.action == 'completed' &&
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Download preview artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: render-preview
          path: artifact
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read preview metadata
        id: meta
        run: |
          echo "pr=$(cat artifact/preview_meta/pr_number.txt)" >> "$GITHUB_OUTPUT"
          echo "has_changes=$(cat artifact/preview_meta/has_changes.txt)" >> "$GITHUB_OUTPUT"

      - name: Deploy to GitHub Pages
        if: steps.meta.outputs.has_changes == 'true'
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: artifact/diff_site
          destination_dir: _pr/${{ steps.meta.outputs.pr }}
          keep_files: true

      # A push to gh-pages only updates the branch; GitHub Pages then builds and
      # publishes it asynchronously. Poll until the URL serves the page carrying
      # THIS render run's marker, so an existing preview's stale content can't be
      # mistaken for the new one and the announced link is never stale or a 404.
      - name: Wait for preview to be published
        id: wait
        if: steps.meta.outputs.has_changes == 'true'
        env:
          URL: https://${{ github.repository_owner }}.github.io/nf-metro/_pr/${{ steps.meta.outputs.pr }}/index.html
          MARKER: ${{ github.event.workflow_run.id }}
        run: |
          live=false
          for i in $(seq 1 20); do
            body=$(curl -sS "${URL}?cb=${{ github.run_id }}-${i}" 2>/dev/null || true)
            if printf '%s' "$body" | grep -qF "nf-metro-render-run\" content=\"${MARKER}\""; then
              live=true; break
            fi
            echo "attempt ${i}: marker ${MARKER} not live yet"
            sleep 15
          done
          echo "live=${live}" >> "$GITHUB_OUTPUT"

      - name: Comment on PR (preview live)
        if: steps.meta.outputs.has_changes == 'true' && steps.wait.outputs.live == 'true'
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2
        with:
          header: render-preview
          number: ${{ steps.meta.outputs.pr }}
          message: |
            **Render preview** is ready for review:
            :framed_picture: https://${{ github.repository_owner }}.github.io/nf-metro/_pr/${{ steps.meta.outputs.pr }}/

            This preview shows only the renders that changed compared to `main`.

      - name: Comment on PR (preview still publishing)
        if: steps.meta.outputs.has_changes == 'true' && steps.wait.outputs.live != 'true'
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2
        with:
          header: render-preview
          number: ${{ steps.meta.outputs.pr }}
          message: |
            **Render preview**: :hourglass_flowing_sand: rendered and pushed; GitHub Pages is still publishing it. The link will work shortly:
            :framed_picture: https://${{ github.repository_owner }}.github.io/nf-metro/_pr/${{ steps.meta.outputs.pr }}/

            This preview shows only the renders that changed compared to `main`.

      - name: Comment on PR (no changes)
        if: steps.meta.outputs.has_changes == 'false'
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2
        with:
          header: render-preview
          number: ${{ steps.meta.outputs.pr }}
          message: |
            **Render preview**: no visual changes detected. All renders match `main`.
