gallery:
  # ── Getting Started ────────────────────────────────────────────────────────
  - id: simple_pipeline
    source_dir: examples
    category: Getting Started
    description: Minimal two-line pipeline with no sections.
  - id: rnaseq_auto
    source_dir: examples
    category: Getting Started
    description:
      "Demonstrates fully auto-inferred layout: no `%%metro grid:` directives needed.
      See [nf-core Pipelines](/nf-metro/pipelines/) for the full gallery."
  - id: rnaseq_sections
    source_dir: examples
    category: Getting Started
    description:
      Same pipeline with manual `%%metro grid:` overrides and file markers, showing
      how explicit directives can fine-tune placement.

  # ── Feature Showcase ───────────────────────────────────────────────────────
  - id: directional_flow
    source_dir: examples
    category: Feature Showcase
    description:
      "Opt-in static flow chevrons via `%%metro directional: true` (CLI: `--directional`):
      periodic open chevrons ride each route pointing source to target. A three-line bundled
      trunk fans out to per-line analyses and converges again, so the chevrons make bundle,
      fan-out, and merge direction legible without the animated `--animate` balls. Marker size,
      spacing, opacity, and colour are `Theme` knobs."
  - id: line_spread
    source_dir: examples
    category: Feature Showcase
    description:
      "Demonstrates the `%%metro line_spread:` axis with one per-section override
      per section: `bundle` (default) merges shared lines onto one trunk that cascades downward,
      `centered` balances that bundle about the midline, and `rails` draws each line as a parallel
      rail with shared stations as interchanges."
  - id: cross_track_interchange
    source_dir: examples
    category: Feature Showcase
    description:
      "Demonstrates `%%metro interchange:`: parallel tumour/normal lanes share one
      MarkDuplicates step without merging, drawn as a cross-track interchange so each lane stays
      straight on its own track instead of pinching together to a point. Auto-layout infers
      the same interchange for fully-parallel lanes even without the directive."
  - id: marker_styles
    source_dir: examples
    category: Feature Showcase
    description:
      Per-station marker shapes & fills encoding tool attributes (mandatory/optional/accelerated/expanded-elsewhere)
      with a marker key alongside the line legend. Demonstrates `%%metro marker:` and `%%metro
      marker_legend:`.
  - id: diagonal_labels
    source_dir: examples
    category: Feature Showcase
    description:
      "Opt-in diagonal station labels via `%%metro label_angle: 45`: a dense pre-processing
      trunk whose tilted names pack tighter than horizontal labels would, feeding a variant-calling
      section in the row below that fans out to three callers and back in -- the reserved vertical
      room keeps the hanging labels clear of the row beneath."
  - id: file_icons
    source_dir: examples
    category: Feature Showcase
    description:
      "Terminus icon variants: single-sheet `%%metro file:`, stacked `%%metro files:`
      for multiplicity, the `%%metro dir:` folder, and the optional `| banner` format strip."
  - id: legend_logo_placement
    source_dir: examples
    category: Feature Showcase
    description:
      "Demonstrates positioning the bundled legend+logo block: `%%metro legend: br
      | canvas` pins it to the empty lower-right canvas corner and `%%metro logo_scale:` enlarges
      the embedded logo. The directive also supports `| dx,dy` offsets and absolute `x,y` placement;
      the block auto-avoids sections and routes. The QC line shows a downward cross-column feeder
      dropping straight into its consumer section."
  - id: legend_combo
    source_dir: examples
    category: Feature Showcase
    description:
      "Demonstrates `%%metro legend_combo:`: a normal (blue) and tumor (red) line
      travel together as a tumor-normal pair. The combo renders one legend row with a striped
      red+blue swatch. Normal travels only within the bundle so its individual row is suppressed,
      while tumor breaks away alone to Annotate and keeps its own row; the QC line is unaffected."
  - id: group_labels
    source_dir: examples
    category: Feature Showcase
    description:
      Annotative `%%metro group:` band captions labelling sarek-style sub-families
      of callers (SNPs & Indels / SV & CNV / MSI) within a single section, without splitting
      them apart.
  - id: off_track_outputs
    source_dir: examples
    category: Feature Showcase
    description:
      "Off-track file artefacts hung above a pre-processing trunk at the step that
      writes each one: `%%metro off_track:` on a producer-fed sink anchors it to its producer
      (not the section top), mirroring the off-track input mechanism for outputs. Each output
      gets its own column clear of the next station, and a step writing several files (MarkDup
      here) stacks them above it."
  - id: tb_file_termini
    source_dir: examples
    category: Feature Showcase
    description:
      "A `%%metro direction: TB` reporting section whose file outputs are line termini.
      Regression fixture: terminus file icons orient to a vertical flow, with the connector
      entering from the top."
  - id: disconnected_components
    source_dir: examples
    category: Feature Showcase
    description:
      A connected three-section trunk plus a separate, wide disconnected section.
      Each weakly-connected component of the section graph is placed in its own local column
      grid and the components are stacked vertically, so the wide panel never inflates the trunk's
      columns or flings its later sections to the right.
  - id: multi_section_cell
    source_dir: examples/topologies
    category: Feature Showcase
    description:
      "Multiple sections packed into one grid cell: a `%%metro grid:` directive
      names two comma-separated sections that share a cell and pack side-by-side
      along the flow axis. A short+long pair in one row aligns top-to-bottom with
      a long+short pair packed into the same column below it, freeing the
      bottom-left for the legend."
  - id: fanout_bundle_plus_spurs
    source_dir: examples/topologies
    category: Feature Showcase
    description:
      "A shared source fans out three ways at once: a same-column multi-line
      branch wrapping to the row below, plus single-line spurs peeling off the
      same junction. The branch bundle keeps its concentric fan order, each
      spur's descent fuses onto the bundle rather than crossing it, and the
      single-line spur sections ride their own trunks."
  - id: folded_corridor_distinct_lanes
    source_dir: examples/topologies
    category: Feature Showcase
    description:
      "Two distinct lines share a folded RL return corridor: they co-travel the
      trunk and fold drop as adjacent lanes, diverge where one line bypasses a
      section while the other routes through it, and reconverge at the final
      section. Every shared channel keeps the two lines an OFFSET_STEP apart
      rather than collapsing one stroke onto the other."
  - id: opposing_bypass_corridor
    source_dir: examples/topologies
    category: Serpentine Layout
    description:
      "A line runs left-to-right into a folded row and right-to-left back out of
      it through the same inter-row gap. The counter-running feed and return get
      distinct, direction-specific corridors: the LR feed rides an upper band and
      the RL return keeps its own lower band a full lane beneath it, rather than
      folding back over one shared track."
  - id: opposing_return_row_pair
    source_dir: examples/topologies
    category: Serpentine Layout
    description:
      "A single line drops from the top row into a right-hand section then returns
      leftward to a sibling below. The descending feed and the returning leg share
      one inter-row gap; each takes its own horizontal corridor a clear lane apart
      instead of the two grazing at a 4px sliver."
  - id: straight_drop_below
    source_dir: examples/topologies
    category: Feature Showcase
    description:
      "A branch fans off at a junction and drops into a section directly below
      it, in a column that clears both neighbouring boxes. The connecting leg
      descends as one straight vertical run into the top-entry port rather than
      leading out to a parallel channel and jogging back onto the port at the
      section boundary."
  - id: peeloff_straight_drop_near_wall
    source_dir: examples/topologies
    category: Feature Showcase
    description:
      "A branch peels off an inter-section trunk at a junction and drops into a
      single-line section two rows directly below, sharing the junction's X with
      the top-entry port. The drop column runs one curve radius outside the
      flanking boxes' walls on both sides; the leg still descends as one straight
      vertical into the port rather than stepping out past the column and jogging
      back onto the port at the boundary."
  - id: top_entry_bundle_offset_seam
    source_dir: examples/topologies
    category: Feature Showcase
    description:
      "A line splits off a shared multi-line trunk and drops into a section
      through its `entry: top` port while carrying a within-bundle offset. The
      inter-section descent tapers that offset away before the boundary so it
      lands on the port's own X, meeting the intra-section drop as one
      continuous stroke rather than stepping sideways across the top edge."
  - id: multirow_source_stacked_fan
    source_dir: examples/topologies
    category: Feature Showcase
    description:
      "A source section spanning three grid rows feeds three vertically stacked
      downstream sections through one right-exit port, while an in-section
      terminal forces the exiting lines onto a bypass. The three lines descend
      together from the trunk to the lower exit row over a diagonal flattened
      toward 45 degrees, so they read as distinct parallel tracks rather than
      fusing into one stroke on a near-vertical drop."
  - id: top_entry_left_neighbour
    source_dir: examples/topologies
    category: Feature Showcase
    description:
      "A section with a `entry: top` port fed by its left neighbour in the same
      grid row. The connector rises in the inter-section gap to just above the
      target's top edge, runs across to the port's column, and drops straight
      in. The port rides the top edge even when the box grows upward to align
      with a taller row-mate, and the up-leg clears only the header badge rather
      than overshooting into the shared inter-row channel."

  # ── Realistic Pipelines ────────────────────────────────────────────────────
  - id: genomic_pipeline
    source_dir: examples
    category: Realistic Pipelines
    description:
      "Multi-section genomic variant-calling pipeline: same-direction sections stacked
      in one column (serpentine carriage-return) plus a multi-row QC collector fan-in descending
      a shared inter-column corridor."
  - id: longread_variant_calling
    source_dir: examples
    category: Realistic Pipelines
    description:
      "Dense long-read variant-calling pipeline (six lines, nine sections): exercises
      inter-section routing around non-connecting section boxes, cross-row feeds via the inter-row
      gap, same-line bundle coincidence, and a same-colour crossover bridge."
  - id: sarek_metro
    source_dir: examples
    category: Realistic Pipelines
    description:
      "Integration showcase: a sarek-style variant-calling pipeline drawn with diagonal
      (45-degree) labels for tight column packing, an off-track FASTQ input, file termini, marker
      styles, and a `%%metro line_spread: rails` panel where each caller keeps its own rail
      and shared stations render as interchanges."
  - id: differentialabundance
    source_dir: examples
    category: Realistic Pipelines
    description:
      "nf-core/differentialabundance with four input lines, off-track gene-set inputs,
      and a bypass-heavy reporting row. Uses `%%metro center_ports: true`."
  - id: differentialabundance_default
    source_dir: examples
    category: Realistic Pipelines
    description:
      Same nf-core/differentialabundance map at default (uncentered) layout — useful
      for spotting regressions that only show with default port placement.
  - id: genomeassembly_staggered
    source_dir: examples
    category: Realistic Pipelines
    description:
      "sanger-tol/genomeassembly with explicit `%%metro grid:` directives stacking
      each section in its own grid row. Regression fixture: cross-column junction routes were
      going backward in X."
  - id: rnaseq_lite
    source_dir: examples/topologies
    category: Realistic Pipelines
    description: Simplified RNA-seq pipeline with three analysis routes.
  - id: variant_calling
    source_dir: examples/topologies
    category: Realistic Pipelines
    description: Variant calling pipeline with four lines sharing alignment.
  - id: foldback_exit_peeloff
    source_dir: examples/topologies
    category: Realistic Pipelines
    description:
      "An auto-folded serpentine (`%%metro fold_threshold: 15`) where a return-row
      section exit splits a bundle to two downstream sections: one line continues
      level along the row, the other turns down to a lower loop. Regression fixture
      for the peel-off lane crossover at the exit -- the reversal must follow the
      continuing line through the peel-off junction so it stays level."
  - id: rowmate_tb_side_entry_top_align
    source_dir: examples/topologies
    category: Realistic Pipelines
    description:
      "An auto-folded RNA-seq map whose row-0 Post-processing section is a TB
      section entered from the left. Regression fixture: the perpendicular entry
      approach occupies the band above the section's first station, so the
      content-hug shrink must not drop the section's box top below its feeder
      row-mate, floating its number badge beneath the rest of the grid row."
  - id: rowmate_tb_side_entry_top_align_grow
    source_dir: examples/topologies
    category: Realistic Pipelines
    description:
      "A row-0 TB Post-processing section entered from the left sits beside a
      tall fan section whose box top grows upward to fit a branch above its
      trunk. Regression fixture: when the feeder row-mate's top grows, the
      side-entered vertical section must follow it up rather than hugging its
      low content, keeping its number badge level with the rest of the grid row."
  - id: seqinspector
    source_dir: examples/showcase
    category: Realistic Pipelines
    description:
      "nf-core/seqinspector with an explicit `%%metro grid:` stacking two single-row
      sections (Run Folder, BAM Files) in the column beside a rowspan-2 FASTQ section.
      Regression fixture: the stacked sections must fill the rowspan band -- the top one's
      box top meets the band top (instead of a fan poking into the title) and the bottom
      one's box bottom meets the band bottom (instead of floating high with slack below)."

  # ── Basic Topologies ───────────────────────────────────────────────────────
  - id: single_section
    source_dir: examples/topologies
    category: Basic Topologies
    description: One section, one line. The simplest possible case.
  - id: deep_linear
    source_dir: examples/topologies
    category: Basic Topologies
    description: Seven sections in a straight chain. Exercises the grid fold threshold.
  - id: parallel_independent
    source_dir: examples/topologies
    category: Basic Topologies
    description: Two disconnected pipelines stacked vertically.
  - id: disconnected_components_fold
    source_dir: examples/topologies
    category: Basic Topologies
    description:
      "A folded disconnected-component layout (`%%metro fold_threshold: 3`). The main trunk
      folds into a serpentine while a wide standalone section stacks below it. Regression
      fixture for full clearance between the wide section and the folded trunk's bottom row."
  - id: mismatched_tracks
    source_dir: examples/topologies
    category: Basic Topologies
    description: Lines with mismatched track counts at shared stations.
  - id: self_crossing_bridge
    source_dir: examples/topologies
    category: Basic Topologies
    description:
      One colour whose vertical bus crosses its own independent horizontal connector
      earns a bridge gap (same-colour crossover, not a fan).

  # ── Fan-out and Fan-in ─────────────────────────────────────────────────────
  - id: out_of_section_retag_fan
    source_dir: examples/topologies
    category: Fan-out and Fan-in
    description:
      A section's symmetric dead-end fan (Salmon peels up, Split strand to
      Genome cov runs straight, Coverage peels down) stays intact even though
      Salmon sends two lines off to a downstream section on IDs used nowhere
      inside the section. Fan eligibility keys off the lines that traverse the
      section's own trunk, not the raw union crossing its ports, so a
      downstream-only retag never disqualifies the fan.
  - id: fork_join_interior_label
    source_dir: examples/topologies
    category: Fan-out and Fan-in
    description:
      A three-way fork-join whose wide middle-branch label sits inside the loop.
      The loop widens symmetrically so the interior label clears the diverging and
      reconverging bundles on both sides, keeping the branch centred.
  - id: wide_fan_out
    source_dir: examples/topologies
    category: Fan-out and Fan-in
    description: One source fanning out to four target sections.
  - id: wide_fan_in
    source_dir: examples/topologies
    category: Fan-out and Fan-in
    description: Four sources converging into one target section.
  - id: section_diamond
    source_dir: examples/topologies
    category: Fan-out and Fan-in
    description: "Section-level fork-join: fan-out then reconverge."
  - id: uneven_diamond
    source_dir: examples/topologies
    category: Fan-out and Fan-in
    description:
      Node-level fork-join whose branches differ in length; each branch holds its
      own track instead of collapsing the shorter ones together.
  - id: symmetric_diamond_beside_wide_fan
    source_dir: examples/topologies
    category: Fan-out and Fan-in
    description:
      "A `diamond_style: symmetric` 2-way fork-join sharing a section with a wider
      3-way fan. The 2-way diamond straddles its trunk evenly, but at full pitch -- as tall
      as the 3-way fan, with an empty trunk row between its branches -- because the half-pitch
      compaction is a per-section decision the mixed-fan section cannot qualify for (#1076)."
  - id: symmetric_multiline_merge_median
    source_dir: examples/topologies
    category: Fan-out and Fan-in
    description:
      "Three metro lines on distinct tracks converging on one shared station under
      `diamond_style: symmetric`. The merge anchors on the median feeder track (the
      middle line) rather than the first-declared line's extreme track, so each feeder
      bends toward it by the least amount (#1277)."
  - id: symmetric_deadend_fanout
    source_dir: examples/topologies
    category: Fan-out and Fan-in
    description:
      "A 2-way fan-out under `diamond_style: symmetric` whose branches never reconverge:
      one is a single-station stub, the other a short processing chain ending in a file.
      Both branches straddle the fork at half pitch and each stays on its own track for
      its whole length -- the chain does not dip back to the trunk (#1299)."
  - id: symmetric_deadend_fanout_exit
    source_dir: examples/topologies
    category: Fan-out and Fan-in
    description:
      "The same symmetric 2-way fan-out where one branch leaves the section via an exit
      port instead of dead-ending.  The dead-end coverage branch stays fanned to the end,
      while the exiting branch falls back to the trunk to meet its exit port (#1299)."
  - id: side_branch_ascent_label_strike
    source_dir: examples/topologies
    category: Fan-out and Fan-in
    description:
      A symmetric 2-way fan-out where a multi-line side branch (Salmon) ascends
      from off the trunk to the section's shared exit port, passing a wide
      trunk-sibling label (BEDTools genomecov) along the way. It rides its own
      track and turns up late at the exit port, so its riser clears the label
      rather than raking through it mid-section.
  - id: symmetric_diamond_odd_slot_entry
    source_dir: examples/topologies
    category: Fan-out and Fan-in
    description:
      "A reconverging 2-way diamond under `diamond_style: symmetric` whose branches sit
      an odd number of grid slots apart, so the fork midpoint lands off-grid.  The LR
      entry port centres on that midpoint -- matching the join station the branches
      reconverge at -- so the entry fork reads as symmetric as the exit fork (#1459)."
  - id: terminal_symmetric_fan
    source_dir: examples/topologies
    category: Fan-out and Fan-in
    description:
      A terminal section whose entry fans into equal-rank sinks; the fan stays symmetric
      about the entry port (regression lock for top-anchored terminal fans).
  - id: internal_source_equal_sibling_2fan
    source_dir: examples/topologies
    category: Fan-out and Fan-in
    description:
      "An internal source station feeds exactly two equal-sibling branches (same line,
      same downstream join). The source is centred between its two consumers, which
      straddle it symmetrically, rather than staying collinear with one branch while the
      other peels off (#1223)."
  - id: trunk_through_fan
    source_dir: examples/topologies
    category: Fan-out and Fan-in
    description:
      "A pass-through section: the trunk runs straight through a symmetric fan-and-reconverge,
      exit on the merge row (regression lock for detached reconvergence exits)."
  - id: wide_label_fan
    source_dir: examples/topologies
    category: Fan-out and Fan-in
    description:
      A two-column fan whose station labels are wider than the column pitch; the
      engine wraps the labels and widens spacing so they don't collide.
  - id: wrapped_label_trunk
    source_dir: examples/topologies
    category: Fan-out and Fan-in
    description:
      A wrapped station label on a lower track whose block would grow into the metro
      line on the track above; the label is pulled back to its un-pushed anchor so the name
      clears the line.
  - id: funcprofiler_upstream
    source_dir: examples/topologies
    category: Fan-out and Fan-in
    description:
      "A profiling section whose stacked tools share a fan-in/fan-out: a line the
      'FMH FunProfiler' station does not carry would rake its wide below-station label, so
      the label flips to its clear side and the diagonal no longer strikes the glyphs."
  - id: fanin_join_diff_length_branches
    source_dir: examples/topologies
    category: Fan-out and Fan-in
    description:
      "One station fans out to four lines of differing branch lengths, one of which is a
      two-way fork-join. Regression fixture for #1456: under the default `straight` diamond
      the join snapped onto its line's declaration-order base track, which a wide fan-out had
      already given to another line's station, stacking two stations in one cell."
  - id: fanout_line_reused_nonadjacent_leg
    source_dir: examples/topologies
    category: Fan-out and Fan-in
    description:
      "A four-leg fan-out reuses the same line on two non-adjacent legs, with two
      distinct lines on the legs between them. Regression fixture for #1529: fan-port lane
      assignment gave the repeated line separate inner and outer lanes, leaving an empty
      interior lane that made the station's bundle non-contiguous and aborted rendering."

  # ── Branching and Multipath ────────────────────────────────────────────────
  - id: asymmetric_tree
    source_dir: examples/topologies
    category: Branching and Multipath
    description: One root branching into three paths of different depths.
  - id: complex_multipath
    source_dir: examples/topologies
    category: Branching and Multipath
    description: Four lines taking different routes through six sections.
  - id: interchange_lane_reorder
    source_dir: examples/topologies
    category: Branching and Multipath
    description:
      "Two lanes share one step while a third lane is declared between them. Auto-layout
      reorders the interleaving lane to an outer track so the two members become adjacent and
      infer a clean interchange, instead of abstaining (issue #779)."

  # ── Multi-line Bundles ─────────────────────────────────────────────────────
  - id: multi_line_bundle
    source_dir: examples/topologies
    category: Multi-line Bundles
    description: Six lines travelling through the same three-section chain.
  - id: mixed_port_sides
    source_dir: examples/topologies
    category: Multi-line Bundles
    description: A section with both RIGHT and BOTTOM exits.
  - id: compact_hidden_passthrough
    source_dir: examples/topologies
    category: Multi-line Bundles
    description:
      Compact mode keeps a hidden single-line pass-through station on its bundle
      slot so the two lines weave consistently through the section.
  - id: compact_gap_peer_conflict
    source_dir: examples/topologies
    category: Multi-line Bundles
    description:
      A fork-join whose hub carries non-consecutive offset slots safely abandons
      gap-compaction when a visible same-layer peer carries the intervening line, rather than
      cascading the reorder.
  - id: bundle_terminator_continuation
    source_dir: examples/topologies
    category: Multi-line Bundles
    description:
      A two-line bundle enters a station where one line terminates while the other
      continues to a single successor. The successor holds the trunk row rather than dropping
      to its own line base, so the chain runs flat instead of dipping into a V-kink before the
      section exit.
  - id: aligner_row_terminator_lane_gap
    source_dir: examples/topologies
    category: Multi-line Bundles
    description:
      "Four aligner lines enter a section together, but one (Bowtie2/Salmon) peels
      off to MultiQC and terminates inside the section instead of reaching its shared exit port.
      HISAT2, which does exit, sits on a contiguous offset there rather than inheriting a gap
      reserved for the terminated line, so its connector into the next section runs level
      instead of kinking into a short diagonal (issue #1263)."

  # ── TB / BT Sections ───────────────────────────────────────────────────────
  - id: bt_chain
    source_dir: examples/topologies
    category: TB / BT Sections
    description:
      "A `%%metro direction: BT` (bottom-to-top) section: a three-station chain whose
      flow runs up the column, the vertical mirror of a TB chain (#1044)."
  - id: bt_fork
    source_dir: examples/topologies
    category: TB / BT Sections
    description:
      "A symmetric fan-out inside a `%%metro direction: BT` section: the hub sits
      at the bottom and both branches fan upward, the lane bundle riding the `+x` side as the
      rotation image of a TB fork (#1044)."
  - id: bt_perp_entry_below
    source_dir: examples/topologies
    category: TB / BT Sections
    description:
      "A BT section fed from below: a lower BT section's trailing TOP exit continues
      up the shared lane into an upper BT section's BOTTOM entry, a two-line bundle riding
      one column across the seam (#1044)."
  - id: bt_exit_top_above
    source_dir: examples/topologies
    category: TB / BT Sections
    description:
      A BT section's trailing TOP exit dropping up into the BOTTOM entry of an LR
      section stacked above it (#1044).
  - id: bt_exit_top_above_2line
    source_dir: examples/topologies
    category: TB / BT Sections
    description:
      "The two-line form of the BT TOP-exit drop into an LR BOTTOM entry: the bundle
      keeps its lane across the perpendicular boundary, the BT feeder fanning +x rather than
      the downward-TB -x (#1066)."
  - id: bt_to_lr
    source_dir: examples/topologies
    category: TB / BT Sections
    description:
      A BT section's trailing TOP (perpendicular) exit taking the up-and-over corridor
      into the LEFT entry of a neighbouring LR section, a two-line bundle staying parallel across
      the seam (#1044).
  - id: bt_to_tb
    source_dir: examples/topologies
    category: TB / BT Sections
    description:
      "A BT section's RIGHT exit feeding a TB section's LEFT entry: an upward flow
      handing off to a downward one across the column seam (#1044)."
  - id: tb_fork_lane_transpose
    source_dir: examples/topologies
    category: TB / BT Sections
    description:
      "A vertical-flow (TB) section whose trunk station forks one line down to an
      in-section file terminus and the other out to a side exit through a bypass
      helper. The bypassing line rides the section's lane side of the trunk, so its
      fork leg reaches the bypass without crossing the straight-down terminus leg
      (issue #1163)."
  - id: tb_passthrough_trunk
    source_dir: examples/topologies
    category: TB / BT Sections
    description:
      "A three-line bundle running straight down a linear chain of stations in a
      `%%metro direction: TB` section. The trunk passes through each station as a clean vertical
      column: every line holds one offset, so no station reads as an elbow."
  - id: tb_internal_diagonal
    source_dir: examples/topologies
    category: TB / BT Sections
    description:
      "A symmetric fan-out inside a `%%metro direction: TB` section: the hub centres
      over its two branch stations, which sit on X tracks either side of it, so both internal
      edges route as 45-degree diagonals (the `_route_tb_internal` diagonal arm) (#917)."
  - id: tb_trunk_through_fan
    source_dir: examples/topologies
    category: TB / BT Sections
    description:
      "An asymmetric fan-out inside a `%%metro direction: TB` section: one line continues
      straight down the trunk column to its child while a sibling peels off to another column.  The
      continuation is slotted onto the trunk so it drops straight instead of jogging one offset
      step (#929)."
  - id: tb_passthrough_continuation
    source_dir: examples/topologies
    category: TB / BT Sections
    description:
      "A TB convergence that is not a sink: a diagonal feeder continues straight
      down to a station directly below the merge while a collinear feeder peels off. The continuation
      rides the trunk slot so it drops straight, instead of being forced outboard where it kinks
      at the merge and crosses the collinear feeder (issue #1012)."
  - id: tb_column_continuation_two_lines
    source_dir: examples/topologies
    category: TB / BT Sections
    description:
      "A TB section with a two-line BOTTOM exit continuing straight down into the
      TB section below. The exit port seats close to the last station with normal section padding
      rather than the doubled gap the fold-span extension would add (issue #1062)."
  - id: tb_right_entry_stack
    source_dir: examples/topologies
    category: TB / BT Sections
    description:
      "A two-line bundle into a stacked TB section's RIGHT entry from a same-row
      left source: it loops over the section top and descends into the port, the U-turn transposing
      the bundle, with concentric corners built via `build_concentric_bundle` (#707)."
  - id: right_entry_over_top_tall_upstream
    source_dir: examples/topologies
    category: TB / BT Sections
    description:
      "A same-row bundle wraps over the top of a stacked TB section's RIGHT entry
      while a taller upstream row-mate protrudes into the band above the target.
      The over-top channel drops into the inter-row gap below that box's bottom
      edge instead of running through its interior (#1364)."
  - id: tb_bottom_entry_flow_start
    source_dir: examples/topologies
    category: TB / BT Sections
    description:
      "A `%%metro direction: TB` section given `%%metro entry: bottom` whose consumer
      is the flow-start (top) station. The bottom entry is re-anchored to the top so the line
      enters beside its consumer and flows down, rather than running up through MultiQC to reach
      Collect and folding back (#885)."
  - id: tb_left_exit_step
    source_dir: examples/topologies
    category: TB / BT Sections
    description:
      "A TB alignment section exits LEFT into a lower right-entry section with a
      blocker directly below: the exit bundle steps west-down-west, routed as a parallel staircase
      that keeps the feed order (issue #671)."
  - id: tb_lr_exit_left
    source_dir: examples/topologies
    category: TB / BT Sections
    description:
      "A `%%metro direction: TB` section dropping in through its TOP entry and leaving
      through a LEFT exit into a section below-left (the `_route_tb_lr_exit` LEFT arm): the
      station drops, turns once, and runs out of the box's left side, the vertical leg fanned
      by the reversed station offset so the outermost line takes the widest arc (#917)."
  - id: tb_lr_exit_right
    source_dir: examples/topologies
    category: TB / BT Sections
    description:
      "A `%%metro direction: TB` section dropping in through its TOP entry and leaving
      through a RIGHT exit into the next forward section (the `_route_tb_lr_exit` RIGHT arm):
      the mirror of the LEFT exit, fanned by the exit port's own offset (#917)."
  - id: tb_convergence_straight_drop
    source_dir: examples/topologies
    category: TB / BT Sections
    description:
      "Two lines converge at a TB section's terminal merge; the feeder whose source
      is collinear with the merge drops dead straight while the sibling arrives diagonally,
      instead of the straight feeder kinking off its lane (issue #1007)."
  - id: tb_bottom_exit_fork_diamond
    source_dir: examples/topologies
    category: TB / BT Sections
    description:
      "A TB section's BOTTOM exit forks to two stacked TB sections in different
      rows, the lower also fed by the upper (a diamond). The fork junction's leg into the nearer
      TOP entry drops straight in its column rather than jogging sideways and reversing at the
      boundary, and the leg continuing to the far section rides the intervening section's own
      trunk for the shared line as one stroke (issue #1058)."
  - id: tb_bottom_exit_bundle_jog
    source_dir: examples/topologies
    category: TB / BT Sections
    description:
      "A four-line bundle leaves a TB section's BOTTOM exit and jogs down into the
      TOP entry of an RL section placed in the row below and one column to the left. The four
      lines keep distinct channels through the jog instead of collapsing onto one (issue #1074)."
  - id: tb_perp_exit_side_neighbour
    source_dir: examples/topologies
    category: TB / BT Sections
    description:
      A vertical-flow section's BOTTOM exit feeds a side LR neighbour sharing the
      exit's Y. The connector leaves the port down into the inter-row corridor clear of the
      box, runs across, then turns up into the entry, rather than running straight along the
      section's bottom edge and out through the corner (#1052).
  - id: tb_two_line_vert_seam
    source_dir: examples/topologies
    category: TB / BT Sections
    description:
      A vertical-flow section's RIGHT exit feeds another vertical-flow section's
      LEFT entry with a two-line bundle. The entry sits a station gap above the trunk head so
      both lines enter horizontally then drop straight onto their trunk lanes, rather than the
      staggered line slanting into the trunk for want of drop room (#1054).
  - id: top_entry_header_clash
    source_dir: examples/topologies
    category: TB / BT Sections
    description:
      A TB section's title is long enough to reach under the trunk that drops into
      its TOP entry. Rather than route the line around the title, the header relocates below
      the box so the drop enters cleanly.
  - id: header_side_rotated
    source_dir: examples/topologies
    category: TB / BT Sections
    description:
      A TB section whose trunk drops through the top edge and exits the bottom edge
      blocks the header on both horizontal edges. The title rotates and runs down the clear
      left edge instead of crossing the line.
  - id: header_nudge
    source_dir: examples/topologies
    category: TB / BT Sections
    description:
      "A title too long to fit a rotated side, on a section blocked top and bottom
      by its trunk: the header shifts right past the trunk as a last resort, the canvas growing
      to keep it visible."
  - id: crowded_header_nudge_overtop
    source_dir: examples/topologies
    category: TB / BT Sections
    description:
      "A TB section fed by a TOP entry from an offset source: the feed's horizontal
      lead-in runs over the section's header band, and a route crossing to the right of the
      header's box-width extent must be stepped past. The nudge shifts the header far enough
      right to clear every route in its band, so a crowded header degrades to a clear position
      instead of aborting the render."
  - id: lr_to_tb_top_drop
    source_dir: examples/topologies
    category: TB / BT Sections
    description:
      "An LR section feeds the TOP entry of a TB section stacked directly below.
      With no explicit exit side the engine infers a BOTTOM exit: the line curves out of the
      trunk after the last station and drops straight onto the target trunk, which is aligned
      under the exit."
  - id: lr_to_tb_top_drop_two_lines
    source_dir: examples/topologies
    category: TB / BT Sections
    description:
      Two co-travelling lines drop out of an LR section's explicit BOTTOM exit into
      a TB section's shared TOP entry below, staying parallel through the corner and down to
      the trunk without crossing.
  - id: lr_to_tb_top_near_vertical
    source_dir: examples/topologies
    category: TB / BT Sections
    description:
      A RIGHT-exit LR section feeds the TOP entry of a TB section stacked directly
      below. The explicit right exit leaves on the right, clears the source box, and doubles
      back over the inter-row gap to drop straight onto the target trunk rather than elbowing
      in through the top-right corner.
  - id: lr_to_tb_top_cross_col
    source_dir: examples/topologies
    category: TB / BT Sections
    description:
      A junction source feeds both a same-row RIGHT-entry consumer and a TB section's
      TOP entry two rows below. The downward branch drops onto the target trunk without crossing
      the section boundary off-port.
  - id: lr_to_tb_top_two_lines
    source_dir: examples/topologies
    category: TB / BT Sections
    description:
      Two co-travelling lines from a RIGHT-exit LR section double back into a TB
      section's shared TOP entry below, landing on their trunk X offsets so the bundle stays
      parallel through the boundary without pinching or crossing.

  # ── Serpentine Layout ──────────────────────────────────────────────────────
  - id: fold_fan_across
    source_dir: examples/topologies
    category: Serpentine Layout
    description: Three lines diverge, converge at a fold, then continue on the return row.
  - id: fold_left_exit_right_entry
    source_dir: examples/topologies
    category: Serpentine Layout
    description:
      "A folded TB section's LEFT exit runs straight west into a relocated section's
      RIGHT entry. Regression fixture: the two joined sections share a bbox bottom so
      the straight run clears both edges by the same distance."
  - id: fold_double
    source_dir: examples/topologies
    category: Serpentine Layout
    description: Ten-section linear pipeline with two fold points (serpentine layout).
  - id: fold_stacked_branch
    source_dir: examples/topologies
    category: Serpentine Layout
    description: Stacked analysis sections feeding through a fold into branching targets.
  - id: reconverge_reversed_fold
    source_dir: examples/topologies
    category: Serpentine Layout
    description:
      "Serpentine-fold reconvergence: a multi-modal pipeline fanning out to stacked
      analysis sections and reconverging onto a reversed return row."
  - id: convergence_sink_fold
    source_dir: examples/topologies
    category: Serpentine Layout
    description:
      "Convergence sink folded below its branches: a `fold_threshold` stacks the
      parallel branches in one column and drops the shared sink onto a lower row,
      fed through a TOP entry. Each upper branch's bottom-exit feeder routes around
      the intervening branch boxes through the clear left-side gap rather than
      ploughing straight down through them."
  - id: same_side_culdesac
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      "A line declares its entry on a reversed (RL) section's flow-trailing edge,
      the edge the section flows out of, but its consumer is an interior station
      held off the leading end by a file terminus. Rather than fold the line back
      over the trunk to reach it, the entry re-anchors to the section's leading
      edge; the producer then reaches it by wrapping over the section top, so the
      line reads as a clean loop and the consumer is a straight pass-through."
  - id: bottom_exit_junction_offset_target
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      "A bottom-exit junction fans to two targets in the row below: the section
      directly beneath it and one an extra column over, past an intervening box,
      entered on its left. The offset feed's horizontal leg would run straight
      through the intervening section at the target's station row; it detours
      through the clear inter-row gap above the box instead, dropping into the
      target from the clear inter-column channel (issue #1428)."
  - id: bottom_exit_junction_collinear_top_entry
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      "A bottom-exit junction fans to two targets in the row below and one sits
      directly beneath it, entered on its top. The single line drops collinearly
      down the trunk column into that horizontal-flow target: the inter-section
      approach lands on the trunk column and the in-section drop departs from the
      same column, so approach and drop meet as one straight stroke at the port
      boundary rather than parting onto a bundle-index fan lane (issue #1428
      defect 2 / #1509)."
  - id: shared_cell_fork_trunk_align
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      "Three sections share one grid cell along a row. The tall pre-processing
      fan pushes its flow trunk below the row's top edge, and the quantification
      section carries a full-bundle pass-through (the branch continuing to the
      exit) beside a coverage dead-end chain. The engine aligns the row so the
      through-bundle runs straight across, seats the continuing pass-through on
      the trunk in line with the preceding exit, and peels the coverage dead-end
      off below -- rather than letting the dead-end seize the trunk and kink the
      through-line at the boundary."
  - id: riboseq_fold_two_dir_entry_hintless
    source_dir: examples/topologies
    category: Serpentine Layout
    description:
      "A folded Ribo-seq excerpt with no `%%metro grid:`/`entry:`/`exit:` hints:
      P-site identification sits on the RL return row, fed from the quantification
      section directly above it and the ORF-calling section to its right. Entry-side
      inference picks a single sensible side (the flow-natural RIGHT, which a feed
      reaches) from the feed geometry, so the map lays out cleanly hint-free."
  - id: riboseq_fold_two_dir_entry
    source_dir: examples/topologies
    category: Serpentine Layout
    description:
      "The same folded Ribo-seq excerpt pinned with explicit grid cells and the
      hand-tuned `entry: top` incantation. Regression fixture for #1341's route-around
      and overlap goals: the top-declared entry drags the right-arriving feed and
      the P-site box overlaps its ORF neighbour. Compare the hint-free variant, which
      lays out cleanly."
  - id: convergence_fold_diamond
    source_dir: examples/topologies
    category: Serpentine Layout
    description:
      "Two distinct lines converging into a sink folded below its branches: a
      `fold_threshold` stacks both branches in one column and drops the shared sink
      onto a lower row, fed through a TOP entry. The two feeders, and the run through
      the merge, ride parallel approach channels rather than collapsing onto one
      vertical channel."
  - id: fold_split_targets
    source_dir: examples/topologies
    category: Serpentine Layout
    description:
      "Two folded branches dropping into one section through a shared TOP entry,
      each line continuing to its own separate sink (a fan, not a merge). The
      distinct-line drops stay collapsed onto the column trunk, since they part to
      different stations rather than bundling along a shared run."
  - id: stacked_lr_serpentine
    source_dir: examples/topologies
    category: Serpentine Layout
    description:
      Same-direction sections stacked in one grid column, chained via short vertical
      drops on alternating sides (serpentine), no wrap-around.
  - id: serpentine_grid_wide_bundle
    source_dir: examples/topologies
    category: Serpentine Layout
    description:
      "A two-line bundle folds through a 3x2 section grid: each row flows left to
      right, and the bundle wraps from the right of one row to the left of the next.
      The wrap spans more than one column, so its return run loops through the clear
      inter-row gap with both lines kept fanned around every corner."
  - id: serpentine_grid_tall_bundle
    source_dir: examples/topologies
    category: Serpentine Layout
    description:
      "A two-line bundle folds through a 2x3 section grid, wrapping twice. Each wrap
      returns through its own inter-row gap, so the two stacked return runs stay on
      distinct channels rather than collapsing onto one."
  - id: serpentine_rl_bundle
    source_dir: examples/topologies
    category: Serpentine Layout
    description:
      "A true boustrophedon fold of a two-line bundle: the top row flows left to
      right, drops straight down the right edge, and the return row flows right to
      left via direction: RL. The bundle stays on the outside of the fold the whole
      way round (top, right, then bottom) with no crossover, and the descent column
      aligns under the exit so the drop is a clean U."
  - id: lr_bottom_exit_rl_top_entry_jog
    source_dir: examples/topologies
    category: Serpentine Layout
    description:
      "An LR section's bottom exit drops straight into the top entry of the
      direction: RL section stacked directly below it. The receiving RL section
      reserves an offset slot for a line that peels off inside it, so the descent
      inherits that wider anchoring and lands square on the entry port with no
      sideways jog at the boundary (issue #1212)."
  - id: manual_rl_row_nonconsumer_bypass
    source_dir: examples/topologies
    category: Serpentine Layout
    description:
      "A manual-grid serpentine whose return row flows right to left via
      direction: RL. A non-consumer line shares an exit bundle with a consumed
      line but is not consumed by the intervening RL section, so it must bypass
      around that section rather than route through its interior. The descent
      column lands in the clear gap beside the intervening box and the line
      loops below the whole row into its target (issue #1211)."
  - id: packed_cell_cellmate_bypass
    source_dir: examples/topologies
    category: Serpentine Layout
    description:
      "The same non-consumer bypass as manual_rl_row_nonconsumer_bypass, but
      the intervening section is packed into the same grid cell as the target
      rather than given its own cell. The bypass must still loop around the
      cell-mate's box instead of cutting straight through it (issue #1228)."
  - id: packed_cell_cellmate_bypass_adjacent
    source_dir: examples/topologies
    category: Serpentine Layout
    description:
      "The packed-cell cell-mate bypass with the bypassing line's source section
      sitting in the column immediately adjacent to the packed cell, with no gap
      column to descend through. The bypass must still loop below the cell-mate's
      box rather than collapse back to a straight run through its interior
      (issue #1233)."
  - id: packed_cell_cellmate_bypass_cross_row
    source_dir: examples/topologies
    category: Serpentine Layout
    description:
      "The packed-cell cell-mate bypass where the bypassing line's source is
      itself a member of the packed cell, and the target sits a row below and
      a column over rather than sharing the source's row. The default
      L-shape's source-row leg used to run the full row width before turning,
      cutting straight through the source's own cell-mate. When the gap
      between the source and cell-mate is clear the route drops through it in
      one straight channel and turns along the target row (PR #1405)."
  - id: packed_cell_consumer_drop_in
    source_dir: examples/topologies
    category: Serpentine Layout
    description:
      "A consumer feed into the far member of a packed cell, arriving from the
      row above and to the right. The member hints top/left entry, but the feed
      comes from the right; geometry-aware entry-side inference resolves its
      entry to the right edge so the feed drops straight in rather than wrapping
      below every section to reach a left port (issue #1311)."
  - id: packed_cell_left_entry_under_neighbour
    source_dir: examples/topologies
    category: Serpentine Layout
    description:
      "A section whose packed cell-mate in the row above is wider has its LEFT
      entry port sitting under that neighbour's box. A fan-out junction feeding
      that entry opens its descent in the inter-cell gap beside the source and
      traverses below the neighbour, rather than descending the crossed column's
      outer gap and threading the neighbour's interior (issue #1486, vertical
      descent variant)."
  - id: fan_top_entry_over_tall_section
    source_dir: examples/topologies
    category: Serpentine Layout
    description:
      "A fan-out junction with mixed-handler branches shares one inter-row
      traverse band. One branch is a TOP-entry drop into a section stacked below
      a different, shorter column; its horizontal trunk leg must clear the taller
      row-above section in the crossed column rather than skim its interior. The
      band is measured across the columns the fan's gap branches traverse so the
      run drops below that taller box (issue #1486, horizontal channel variant)."
  - id: branch_fold_forward
    source_dir: examples/topologies
    category: Serpentine Layout
    description:
      "A side branch (Aux) shares a topo column with the spine (Genome). At a low
      fold threshold the serpentine packer skips that branch column as a fold point - folding
      it would strand Genome's consumer (Post) behind it - and folds the spine instead, so
      every inter-section edge flows forward and Genome's exit faces Post (issue #1080)."
  - id: branch_fold_stability
    source_dir: examples/topologies
    category: Serpentine Layout
    description:
      "A wide side branch (Survey) shares a topo column with the spine and sits one
      station below its fold threshold. Adding a station inside Survey must not re-grid the
      downstream Report onto a backward return row: inter-section placement is a function of
      the DAG, not of intra-section size (issue #1082)."
  - id: rl_entry_right_exit_left
    source_dir: examples/topologies
    category: Serpentine Layout
    description:
      "A return-row section fed from the right that exits left, where the right
      entry feeds the section's internal flow-sink. The section resolves to RL
      flow rather than reading the declared ports as an in-place reversal
      (issue #1298)."

  # ── Bypass Routing ─────────────────────────────────────────────────────────
  - id: inrow_skip_breeze
    source_dir: examples/topologies
    category: Bypass Routing
    description:
      An express line skips a station three collinear stations share; the geometric
      bypass pass bows it around the skipped marker (#990).
  - id: sectionless_skip_breeze
    source_dir: examples/topologies
    category: Bypass Routing
    description:
      A skip-line jumps between two stops on a graph with no declared section,
      skipping the stops between them. Interchange inference detects the
      parallel-lane hub and the detour routes around the skipped markers
      instead of through them (#1229).
  - id: interchange_label_clears_bridge
    source_dir: examples/topologies
    category: Bypass Routing
    description:
      An in-section skip infers a two-member interchange at C, drawn with a
      vertical connector bridge between its rails. C's label clears the whole
      bridge (below the far track) instead of landing on it, where plain layer
      alternation would drop it (#1239).
  - id: bypass_fan_in_outer_slot
    source_dir: examples/topologies
    category: Bypass Routing
    description:
      "A bypass line (QC) skips hub and alignment to reach a deeper station (MultiQC
      Report) in the Integration section, while dna/meth/rna/atac converge at a fan-in entry
      port. The bypass line claims the outer slot so no empty interior gaps appear (issue #655)."
  - id: upward_bypass
    source_dir: examples/topologies
    category: Bypass Routing
    description: Tall section bypass where the trunk is above the source (upward gap1).
  - id: bypass_label_rake
    source_dir: examples/topologies
    category: Bypass Routing
    description:
      A foreign line dips below a station to bypass its marker, then climbs back
      to the trunk past the wide 'Quantification' label. The router lengthens the dip's flat
      run so the climb seats clear of the glyphs (`_clear_bypass_v_label_strikes`).
  - id: bypass_label_rake_left
    source_dir: examples/topologies
    category: Bypass Routing
    description:
      "Mirror of the bypass-label rake: the dip's descending leg, not its climb,
      crosses the wide 'Quantification Step' label, so its V corner lands in the label's
      left half and the router seats it clear of the left edge (`_clear_bypass_v_label_strikes`)."
  - id: bypass_label_rake_wide
    source_dir: examples/topologies
    category: Bypass Routing
    description:
      "An extra-wide bypassed-station label the router cannot seat the V's flat-run
      corner clear of: the strike-clearance loop pushes the bypassed node out by whole grid
      columns until the dip clears the glyphs, widening rather than relying on the router's
      partial corner-seating (issue #700)."
  - id: bypass_v_tight
    source_dir: examples/topologies
    category: Bypass Routing
    description:
      "An intra-section bypass V at a tight column pitch: without room for a lead-in
      the descent would diverge on the 'Process A' marker and rake its label. The engine pushes
      the bypassed node to a further grid column so the V diverges past the label and keeps
      a visible flat run through its X (issue #688)."
  - id: fan_bypass_nesting
    source_dir: examples/topologies
    category: Bypass Routing
    description:
      "A junction fans to a straight continuation, three down-turns into stacked
      rows, and one far-column bypass. The bypass joins the same concentric corner as the down-turns
      and descends in the shared channel, peeling into its lane at the inter-row gap rather
      than grazing the down-turn corners near the junction (issue #652)."
  - id: divergent_fanout_split
    source_dir: examples/topologies
    category: Bypass Routing
    description:
      "One line fans out from a single source to a near and a far target in the row
      below. The two descents stay fused as one trunk until the near branch turns off, so the
      farther branch never peels onto the inside of the nearer one and crosses it (issue #702)."
  - id: same_line_fan_distinct_descent
    source_dir: examples/topologies
    category: Bypass Routing
    description:
      "A source fans two same-line branches plus a distinct-line branch down into the
      rows below while a third line carries straight on. Red and green descend as one
      per-line bundle - the two red branches share a single fused track and green sits
      one step beside it - peeling off one branch at a time, rather than the red
      splitting into two parallel same-colour strokes (issue #1409)."
  - id: disjoint_sameline_trunks
    source_dir: examples/topologies
    category: Bypass Routing
    description:
      "Two lines diving into one below-row channel to bypass a section ride a tight
      concentric bundle until a member peels up at its turn column, rather than being split
      apart by a track reserved for a trunk that only appears further along the channel (issue
      #702)."
  - id: dogleg_exempt_distinct
    source_dir: examples/topologies
    category: Bypass Routing
    description:
      "A bypass line cleared off a different line's exempt wrap trunk in the inter-row
      gap runs parallel above it as a tight bundle, rather than doglegging onto the crossing
      side where its riser would pierce the wrap run twice (issue #702)."
  - id: dogleg_exempt_sameline
    source_dir: examples/topologies
    category: Bypass Routing
    description:
      "Two opposing flows of one line fused in the inter-row gap are pulled apart
      into a dogleg; the down-moved trunk stops short of the next row's section header badge,
      keeping the required clearance rather than crowding it (issue #698)."
  - id: dogleg_twoline_fanout
    source_dir: examples/topologies
    category: Bypass Routing
    description:
      "Two distinct lines leave one section through a shared exit junction to different
      sections in the row below. They descend as one concentric bundle and split only where
      the near line peels into its target while the far line continues over it, rather than
      diverging at the junction and crossing (issue #719)."
  - id: bypass_gap2_rightward_overflow
    source_dir: examples/topologies
    category: Bypass Routing
    description:
      A seven-line rightward bypass whose gap-2 bundle right edge overflows the inter-column
      gap limit and is clamped, keeping the bundle inside the gap.
  - id: bypass_leftward_overflow
    source_dir: examples/topologies
    category: Bypass Routing
    description:
      "A seven-line reverse-flow (right-to-left) bypass: the trunk leads out leftward,
      the mirror of every other bypass. The concentric order and corner radii follow the trunk's
      travel direction so the bundle fans cleanly instead of twisting at the descent corner
      (issue #723)."
  - id: bypass_leftward_far_side_entry
    source_dir: examples/topologies
    category: Bypass Routing
    description:
      "A seven-line reverse-flow bypass into a far-side LEFT entry: the source exits
      its left edge and the target's entry port is on its own far (left) edge, so the bundle
      wraps around below into the port from its outward side. The half-turn transposes the bundle,
      so the target section's line order is reversed to match and no line crosses a mate (issue
      #974)."
  - id: exit_corner_offset_dogleg
    source_dir: examples/topologies
    category: Bypass Routing
    description:
      A passing line runs through a section on a per-line bundle offset, then exits
      and bypasses a higher row to climb to a far target. The onward run keeps the line's offset
      over the row-level traverse so it leaves the exit port straight, with the single level
      change a clean riser at the far gap rather than a one-offset-step jog at the exit corner.
  - id: exit_fan_label_strike
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      A multi-line side branch (Salmon) fed only from the section boundary sits
      off the trunk and exits right past a wide trunk-sibling label (BEDTools
      genomecov). It rides its own track and turns up late at the exit port, so
      its riser clears the label rather than raking through it mid-section.
  - id: convergent_offrow_exit_climb
    source_dir: examples/topologies
    category: Bypass Routing
    description:
      A single-row long-read variant-calling map. The annotation section carries
      only snv and sv (the two highest-priority lines), reached through a bypass whose source
      re-based them onto low slots. Its two-line bundle anchors on its own trunk rather than
      inheriting the high global slots, so its markers sit on their rows and the run into reports
      stays level.
  - id: fold_bypass_creep
    source_dir: examples/topologies
    category: Bypass Routing
    description:
      A fold turns the calling section into a vertical bridge and a qc line forks
      around its file terminus into a separate downstream report section. Keeping the bypass
      feeds the bridge's height into the downstream section's placement, which settles one pass
      later, so the report section seats at its converged Y in both validated and unvalidated
      renders.
  - id: fold_bypass_creep_tight
    source_dir: examples/topologies
    category: Bypass Routing
    description:
      The tight variant of the fold bypass, where the file terminus sits one row below
      the forking station, so the qc bypass V seats on the trailing row. The folded
      section's perpendicular exit corridor clears the V by a full station-flat length, so
      the bypass run-out reads as a visible flat rather than collapsing onto the curve apex.

  # ── Merge & Convergence ────────────────────────────────────────────────────
  - id: merge_offrow_continuation
    source_dir: examples/topologies
    category: Merge & Convergence
    description:
      A perpendicular feeder re-slots at a multi-feeder merge port, and the single
      re-joined line leaves the merge row before reaching its consumer one row up, so the bundle-offset
      walk stops at the off-row exit rather than carrying the slot off the row.
  - id: junction_entry_reversed_fold
    source_dir: examples/topologies
    category: Merge & Convergence
    description:
      "A two-line bundle exits a TB section's RIGHT side, wraps into a Source section,
      then fans out at a junction into two same-row destinations. The bundle order is carried
      concentrically through the reversal corners so the lines never cross at a station, and
      the fan-out peels off cleanly (issue #760)."
  - id: convergence_stacked_sink
    source_dir: examples/topologies
    category: Merge & Convergence
    description:
      A leaf sink that would otherwise sit alone in the spine band migrates into
      the convergence return row (no grid-cell collision).
  - id: convergence_sink_above
    source_dir: examples/topologies
    category: Merge & Convergence
    description:
      An input section sits above the shared sink it feeds, while its line is
      declared last. The sink's entry bundle is slotted by feeder approach (the
      feeder whose source sits highest takes the topmost lane) rather than by
      declaration order, so the line runs straight into the port instead of
      dropping down across its bundle-mate.
  - id: top_descent_over_left_entry
    source_dir: examples/topologies
    category: Merge & Convergence
    description:
      A line descending into a shared LEFT entry port from a section above takes
      the topmost lane rather than diving under the feeder arriving level from the
      left, so the two keep a consistent z-order with no boundary crossover.
  - id: top_descent_over_left_entry_junction
    source_dir: examples/topologies
    category: Merge & Convergence
    description:
      The descending feeder reaches the shared LEFT entry port through a fan-out
      junction (as the riboseq map's translational-efficiency section does); it
      still takes the topmost lane, since junction feeders have no section to count
      (issue #1410).
  - id: terminus_join
    source_dir: examples/topologies
    category: Merge & Convergence
    description:
      Two lines converge on a single file-icon terminus in a sectionless flat graph,
      so the join lands directly on the terminus rather than a synthesised convergence junction.
  - id: merge_port_above_approach
    source_dir: examples/topologies
    category: Merge & Convergence
    description:
      "A line descending into a multi-feeder merge port from a section above keeps
      the above-trunk slot all the way to the output, so its riser joins the bundle without
      crossing the trunk on the outgoing run (issue #704)."
  - id: junction_entry_collision
    source_dir: examples/topologies
    category: Merge & Convergence
    description:
      "A three-line fan-out where one line continues straight to its own destination
      while the other two branch away: the straight line keeps a constant bundle slot across
      the source exit so its trunk stays horizontal (issue #704)."
  - id: junction_entry_align
    source_dir: examples/topologies
    category: Merge & Convergence
    description:
      "A two-line bundle whose order is preserved across the junction-to-entry-port
      boundary, so the straight-through line stays horizontal instead of slanting to swap slots
      (issue #704)."
  - id: merge_feeder_shared_channel_gap
    source_dir: examples/topologies
    category: Merge & Convergence
    description:
      Two fan sources each feed one merge junction and one side section; a packed
      cell-mate pushes their shared merge descent into an inter-column gap, so both
      feeders fuse onto a single descent channel that splits to the side and target.
  - id: merge_trunk_out_of_range_section
    source_dir: examples/topologies
    category: Merge & Convergence
    description:
      Two same-row sources merge into one sink past an intervening section while
      another row's section sits outside the merge column range, so the merge trunk keeps its
      same-row bypass channel rather than crossing below the out-of-range section.
  - id: merge_trunk_over_low_section
    source_dir: examples/topologies
    category: Merge & Convergence
    description:
      A same-row merge trunk bypasses past a tall intervening section while a lower-row
      section sits within the merge column range. The inter-row gap clears the lower section's
      header, so the trunk (and its branches) route through that gap rather than diving below
      the whole canvas.
  - id: merge_bottom_row_bypass
    source_dir: examples/topologies
    category: Merge & Convergence
    description:
      "A merge whose entry sits in the bottommost grid row: the trunk's inter-row
      bypass routes in the cramped gap above that row. Placement reserves the gap so the channel
      clears the upper row's section boxes instead of grazing them."
  - id: merge_pullaway
    source_dir: examples/topologies
    category: Merge & Convergence
    description:
      One line converges on a merge from two stacked rows of the same column; the
      cross-row feeder drops onto the trunk's pull-away bypass channel and the two travel as
      a single stroke into the entry.
  - id: merge_right_entry
    source_dir: examples/topologies
    category: Merge & Convergence
    description:
      "One line converges on a RIGHT entry whose consumer is the sink's flow-start
      station: the sink flows right-to-left so the merge arrives beside its consumer, and the
      trunk loops under the sink onto that channel rather than slicing across the box to the
      far station (#885)."
  - id: peeloff_riser_respace
    source_dir: examples/topologies
    category: Merge & Convergence
    description:
      "Four lines from two sources ride one shared bypass trunk and rise into a common
      destination entry port, where the trunk-Y order and the entry-port slot order disagree.
      Each source bundle keeps its declaration order at the peel-off corner instead of inverting
      (issue #695)."
  - id: peeloff_extra_line_consumer
    source_dir: examples/topologies
    category: Merge & Convergence
    description:
      "Same peel-off topology as peeloff_riser_respace but the destination section
      also carries an extra internal branch (l5). The riser reorder must still fire and keep
      the bundle crossing-free at the shared entry port regardless of extra lines in the consumer
      section (issue #751)."
  - id: merge_leftmost_sink_branch
    source_dir: examples/topologies
    category: Merge & Convergence
    description:
      "A leftward merge whose trunk reaches a leftmost-column sink's LEFT entry:
      the trunk wraps to rise on the box's far (left) side, with the branch feeders converging
      on its shared channel, rather than crossing the sink interior to the far-side port."
  - id: merge_around_below_leftmost
    source_dir: examples/topologies
    category: Merge & Convergence
    description:
      "Two sources merging into a leftmost-column LEFT entry: the trunk routes around
      the target's left side to enter from outside while the second merge target is reached
      in-row."
  - id: post_convergence_trunk
    source_dir: examples/topologies
    category: Merge & Convergence
    description:
      Two stacked inputs converge on a station inside one LR section. The merge station's
      single linear successor continues flat on the merge row rather than dropping back onto
      one of the incoming branch rows, so the post-merge trunk runs straight instead of zigzagging.
  - id: junction_fanout_convergence
    source_dir: examples/topologies
    category: Merge & Convergence
    description:
      "Three lines converge into one joint-calling entry port: two bypass the intervening
      sections and climb risers into the port while the third joins flat from the adjacent column.
      The flat shallow feeder takes the port-near slot on top of the climbing pair so the bundle
      turns into the port concentrically, instead of the flat line weaving across the risers
      at the corner."
  - id: aligner_row_pinned_continuation
    source_dir: examples/topologies
    category: Merge & Convergence
    description:
      Three sibling aligners feed one dedup hub that lands on the lead aligner's
      row, while one aligner's line continues on a track pinned to the section bottom by hidden
      continuation stations. The aligners stack on consecutive grid rows instead of the low-line
      aligner being dragged down to crowd its neighbour and strand the middle row (#1071).
  - id: fanin_distant_terminus
    source_dir: examples/topologies
    category: Merge & Convergence
    description:
      "Two sibling methods feed one report icon while a third continues through a
      longer ORF chain that pushes the report to the far end of the section. The siblings
      converge at a local junction one column on and a single trunk carries the merged line to
      the report, instead of the two legs bowing out and running parallel the whole way to the
      distant merge (issue #1296)."

  # ── Inter-section Routing ──────────────────────────────────────────────────
  - id: left_exit_sink_below
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      "A TB bridge's LEFT exit feeds a LEFT-entry sink one row below and to the
      left: the bundle leads out left and drops straight down a channel clear of both boxes,
      routing around the bridge rather than clawing back through its interior (issue #1083)."
  - id: right_entry_gap_above_empty_row
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      "A right-entry feed from a source two rows above its target, where the target
      flows right-to-left so its flow-start consumer sits at the entry edge: the feed loops
      around below into the port beside the consumer rather than crossing the box and folding
      back (#885)."
  - id: corridor_narrow_gap_fallback
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      "A left-entry feed crosses two rows past a wider intervening section whose
      inter-row gap is too narrow for the corridor's clearance band, so it falls back to the
      around-below loop clear of that section while the adjacent feeder takes the corridor (issue
      #722)."
  - id: around_section_below
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      "Cross-row route to a LEFT-entry target past an intervening section: the feed
      runs its horizontal in the clear band abutting the target row and drops into the
      LEFT port, rather than diving below the whole stack. Exercises
      `_route_left_entry_via_gap_above` (collector-fan-in geometry)."
  - id: inter_row_wrap_clearance
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      A right-exit bundle wrapping down to a left-entry in the row below. The horizontal
      run sits centred in the inter-row gap, clear of both the section above and the next row's
      header.
  - id: inter_row_drop_section_clearance
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      An inter-row drop threading the gap between two packed sections whose internal sub-gaps
      are offset by less than the routing clearance. The vertical channel sits centred in the
      overlap, sharing the unavoidable shortfall evenly instead of skimming one section's edge.
  - id: inter_row_drop_section_clearance_row1
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      The same offset packed-section squeeze as inter_row_drop_section_clearance, with the wider
      section in the lower row so the drop would otherwise hug the row-1 section's edge; the
      channel is centred in the gap instead.
  - id: cross_col_top_entry
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      "A cross-column feed from a RIGHT-exit producer into a TOP-entry consumer:
      the entry port is placed on the section boundary rather than floating above the canvas
      (issue #740)."
  - id: lr_top_entry_cross_column
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      "A TB section dropping from its BOTTOM exit into the TOP entry of an LR section
      whose run sits left of the drop column: the LR run is shifted right under the drop and
      the section bbox follows it so the trailing station stays contained (issue #1057)."
  - id: lr_top_entry_cross_column_two_line
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      "Two lines dropping together from a TB BOTTOM exit into the TOP entry of an
      LR section: the in-section line order follows the arrival order so the entry corner nests
      concentrically and the bundle neither pinches nor crosses through the bend (issue #1061)."
  - id: right_entry_wrap_no_fan
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      A single line wrapping from an LR exit into a cross-row RL section's RIGHT
      entry, with no junction siblings (the solo `_route_right_entry_wrap` lead-in).
  - id: stacked_right_ports_coincident
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      A RIGHT exit and its target's RIGHT entry stacked in one grid column pin to
      the shared column-edge X; the feed bows out into the descent channel past the
      port with outward corner curves, and a co-terminating feed shares that channel
      rather than running a separate parallel vertical.
  - id: left_entry_up_wrap
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      A two-line bundle wrapping up-and-left from a source below-and-right into a
      cross-row section's LEFT entry (the `_route_left_entry_wrap` up-riser path); the bundle
      order is preserved concentrically around the wrap.
  - id: around_below_ep_col_gt0
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      "A two-line bundle reaching a non-zero-column LEFT-entry target past an intervening
      middle-row section: it runs the band above the target row and drops into the LEFT
      port from its outward side rather than looping below the canvas."
  - id: stacked_left_exit_drop
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      "A LEFT exit feeding a LEFT entry stacked directly below it: the connector
      leads out into a clean channel left of the column and drops, rather than dropping straight
      down the shared edge through the source box."
  - id: right_entry_from_above
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      "A RIGHT entry whose consumer is the section's flow-start station: the section
      flows right-to-left so the consumer sits at the entry edge and the feed enters beside
      it, rather than running across the box to the far station and folding back (#885).  Fed
      from a higher row past the target's right edge, the line drops straight down its outward
      side to the entry Y rather than looping below the box (#889)."
  - id: right_entry_from_above_far
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      "A RIGHT entry fed from two rows up, past the target's right edge: the line
      drops straight down its outward side across the empty intervening row to the entry Y and
      turns in, rather than diving below the box and climbing back up (#889)."
  - id: left_entry_from_above_far
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      "A LEFT/far-side entry fed from a row above, past an intervening middle-row
      section: the mirror of the RIGHT gap-above path. The feed runs its horizontal in the
      clear band abutting the target row and drops down the target's LEFT side into the port,
      rather than diving to the canvas bottom and running the full width back (#1394)."
  - id: samerow_left_exit_far_left_entry
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      "A same-row feed into a far-side LEFT entry: the source exits LEFT toward a
      target immediately to its left whose entry sits on the target's far (left) edge.
      The loop humps over the target's top through the clear band above its row and
      drops down the target's LEFT side into the port, rather than diving below the
      target box and running the full width back - the same-row sibling of the
      from-above gap-above path (#1397)."
  - id: straddling_fanout_junction
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      "A fan-out junction boxed in by a packed cell-mate on its exit side, whose
      targets straddle it (one adjacent, one far down-and-left). The divergent branch
      peels off to the left, hops the band below the source row across to a clear
      column, and drops through the inter-row gap into the far target, rather than the
      junction trapping it into a canvas-bottom dive past the cell-mate (#1396)."
  - id: route_around_intervening
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      "A line skips a middle section: it routes around the intervening section's
      bbox rather than slicing through it."
  - id: cross_row_gap_wrap
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      A cross-row feed runs its horizontal in the inter-row gap and drops straight
      in, rather than diving under the return row counter to its flow.
  - id: rl_entry_runway
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      "A source section feeding a left-hand target via `%%metro exit: left`: it flows
      right-to-left so its producers sit at the left exit edge and the runway leaves beside
      them, rather than the producers exiting left back through the start station (#885)."
  - id: lr_perp_top_exit_side_entry
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      Two co-travelling lines leave an LR section through an explicit TOP exit and
      feed the LEFT entry of a same-row neighbour. The exit port sits past the last station,
      and the bundle rises into the header band, runs across, and descends to the consumer's
      row to enter straight, staying parallel through every concentric corner.
  - id: lr_perp_bottom_exit_side_entry
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      "The BOTTOM-exit mirror of lr_perp_top_exit_side_entry: the bundle drops below
      the source section, runs across the under-row band, and rises back to the consumer's
      row to enter straight."
  - id: lr_perp_top_exit_perp_entry
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      Two co-travelling lines leave an LR section through a TOP exit and feed the
      TOP entry of a same-row neighbour in another column. The bundle rises over the header
      band and drops into the consumer trunk, keeping a single left/right order across the shared
      entry port so it stays parallel without crossing at the drop.
  - id: lr_perp_bottom_exit_perp_entry
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      "The BOTTOM-exit mirror of lr_perp_top_exit_perp_entry: the bundle drops under
      the row, runs across, and rises into the consumer's BOTTOM entry, staying parallel through
      the corridor."
  - id: lr_perp_top_exit_perp_entry_diverging
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      A TOP-exit bundle taken over the corridor into a TOP entry where the two lines
      split to different downstream stations. Consistent corridor ordering routes each line
      to its target without a convergence jog at the entry.
  - id: cross_column_perp_drop
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      "A `%%metro direction: TB` section fed by a perpendicular drop from a section
      in a different grid column. The vertical trunk stays on the QC section's own column and
      the cross-column feed comes over the top and drops into the trunk head, rather than the
      trunk being dragged out toward the off-column source."
  - id: cross_column_perp_drop_far_exit
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      The cross-column perpendicular drop where the source's exit side faces away
      from the target's entry side (a BOTTOM exit feeding a TOP entry). The lead-in crosses
      to the inter-column gap and reaches the TOP entry from above the box, rather than rising
      up the trunk through the section's stations.
  - id: bottom_row_climb_clear_corridor
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      A section in the bottommost grid row sends a line up and across to a higher-row
      target several columns away. The columns it spans hold no same-row section, so the line
      runs along its own row level and climbs at the end rather than diving below the source
      row to the canvas floor and looping back up.
  - id: multicarrier_offrow_exit_climb
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      A section's exit port carries two lines from two stations that share a trunk
      row off the port row, then fans out through a junction to several rows. The parallel bundle
      anchors on the shared carrier row so it runs flat inside the section and the fan-out risers
      fall in the inter-section gap, rather than both lines climbing a diagonal up to the port
      inside the section.
  - id: clear_channel_target_aware_push
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      A hub fans one line down into a wide section stacked directly below and another
      down-and-right to a target. The fan descent for the rightward line grazes the wide block,
      so the graze correction pushes it toward the target's side of the block rather than the
      nearer edge, keeping the line heading to its target instead of detouring across the canvas.
  - id: near_vertical_junction_hook
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      "A fan-out junction overhanging a same-column RIGHT entry one row below. The
      two-line bundle drops straight down the junction's own column and turns once into the
      port, rather than leading out to a centred gap channel and hooking back: a hook's opposite-handed
      corners cannot nest a multi-line bundle. The destination section carries the matching
      line order so the bundle arrives in the order the section lays it out (#1018)."
  - id: near_edge_exit_corner
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      "A station one column short of its section's right edge whose exit port sits on
      that edge, one lane below it. Equalising the station's flat runs must not push the exit's
      approach corner past the port: the corner stays inside the box so the line turns down through
      the port cleanly rather than bulging outside the section and doubling back (issue #1314)."

  # ── Off-track & Rails ──────────────────────────────────────────────────────
  - id: section_trunk_short_output_branch
    source_dir: examples/topologies
    category: Off-track & Rails
    description:
      "A section holding a long main chain plus a short branch to an off-track output
      file. The long chain rides the section trunk straight and the short output branch
      peels off it, rather than the short branch taking the trunk and forcing the main
      chain onto a diagonal that crosses it (issue #1487)."
  - id: corridor_fed_trunk_output_spur
    source_dir: examples/topologies
    category: Off-track & Rails
    description:
      "A section entered through a LEFT corridor port that fans to a through-chain arm
      (reaching the exit) plus a short off-track output spur. The through-chain rides the
      entry trunk with the spur peeling off below, and the same-row feeder runs straight
      into the port rather than kinking down onto an off-trunk entry (issue #1497)."
  - id: off_track_convergence
    source_dir: examples/topologies
    category: Off-track & Rails
    description:
      Multiple off-track file inputs converging on a single consumer. The trunk stays
      horizontal while the inputs stack above the consumer column.
  - id: off_track_convergence_multiline
    source_dir: examples/topologies
    category: Off-track & Rails
    description:
      "A multi-line bundle enters a section and converges on a deep first station
      that also consumes off-track file inputs. The consumer stays on the section trunk, level
      with its continuation, rather than being dragged to the section floor (issue #650)."
  - id: off_track_input_above_consumer
    source_dir: examples/topologies
    category: Off-track & Rails
    description:
      "A section whose mid-trunk station consumes an off-track input while a neighbouring
      station feeds an off-track output. The input hugs one row above its consumer instead of
      towering an extra slot up because it shares an anchor with the differently-columned output
      (issue #651)."
  - id: off_track_terminal_noop
    source_dir: examples/topologies
    category: Off-track & Rails
    description:
      "A station marked off_track whose only continuation is an inter-section edge to the
      next section, with no in-section successor. It renders inline on the trunk rather than
      lifting into a bump that immediately drops back down to reach the exit port (issue #1295)."
  - id: tb_off_track_output_row
    source_dir: examples/topologies
    category: Off-track & Rails
    description:
      "A `direction: TB` section whose trunk stations feed off-track outputs. Each output hangs off
      its producer via an S -- a flow-axis lead down the trunk, a diagonal, then a flat tail into the
      icon -- on the side opposite the beside-trunk labels, the rotation of the LR off-track idiom,
      rather than leaving perpendicular or dropping onto the label side (issue #1384)."
  - id: tb_offtrack_fork_baseline
    source_dir: examples/topologies
    category: Off-track & Rails
    description:
      "A `direction: TB` section with an asymmetric fork whose branch (markduplicates) overshoots
      the trunk toward the lift side. The off-track downward-branch test anchors its trunk baseline
      to the through-trunk column rather than the lift-most station, so main-trunk producers
      downstream of the fork keep their off-track outputs on the lift side instead of flipping them
      onto the beside-trunk label side (issue #1388)."
  - id: rail_inter_section
    source_dir: examples/topologies
    category: Off-track & Rails
    description:
      "Two `%%metro line_spread: rails` sections joined by an inter-section edge.
      The connector wraps cleanly from the upstream right exit port, down the right margin,
      across the inter-section gap, and down the left margin into the downstream left entry
      port - no dangling port stubs and no avoidable crossings between co-travelling lines."
  - id: rail_offtrack_io
    source_dir: examples/topologies
    category: Off-track & Rails
    description:
      "A `%%metro line_spread: rails` section with off-track `%%metro file:` input
      and output. Each off-track file terminus carries a buffer-stop nub at the rail-side end
      of its vertical stub (like the on-rail CRAM/VCF termini) seated clear of its under-icon
      caption, rather than the line ending bare at the icon."
  - id: rail_offtrack_plain_io
    source_dir: examples/topologies
    category: Off-track & Rails
    description:
      "A `%%metro line_spread: rails` section with plain (non-file) off-track input
      and output. Each plain off-track node renders a station marker at its line end rather
      than a bare stub, and the input's label sits above the node clear of its drop and the
      adjacent station's label."
  - id: render_labelwrap_row_gap
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      "A QC section whose station labels only wrap at render time (`sambamba markdup`
      onto four lines, an `RNA-SeQC` dir-icon branch) grows the section box taller than
      the layout reserved for it. The section directly below keeps the full inter-section
      gap: the render reflows the lower rows down to absorb the late growth rather than
      letting its header badge collide with the grown box."

  - id: fanout_intersection_shared_channel
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      "A source fans out at a junction to two stacked sections below it, and the
      two feed routes co-travel a shared horizontal inter-section channel before
      peeling into a top entry and a left entry. The co-travelling lines keep one
      `OFFSET_STEP` apart on the shared run rather than collapsing to a half-step
      overlay when the inter-row gap is too narrow to reserve a shared fan
      corridor."

  - id: fanout_hub_two_line_trunk
    source_dir: examples/topologies
    category: Multi-line Bundles
    description:
      "A two-line trunk (`a`, `b`) that fans out at a hub into two downstream
      sections. The two-line trunk bundle must render one `OFFSET_STEP` wide, not
      double-width with an empty centre lane, even though the hub's exit port
      re-centres its bundle on the fan-out feeder."

  - id: packed_multiline_serpentine_grid
    source_dir: examples/topologies
    category: Serpentine Layout
    description:
      "A packed multi-row grid where section G shares a grid cell with its
      upstream producer section E and is also fed from the section above it.
      Its `entry: top` and `entry: left` hints name conflicting sides; the
      first-declared side wins and the section enters cleanly from the top
      rather than resolving to a flow-opposing right entry that folds a line
      back over its own track."

  - id: route_around_to_top_entry
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      "A feeder section sits a row below the section it feeds through an
      `entry: top` port. The port faces away from the feeder, so the leg cannot
      rise straight into it without ploughing up through the box; it carries
      past the box's right side, rises to the channel above, then comes back
      right-to-left over the top into the port, clearing the interior entirely."
  - id: route_around_far_column_top_entry
    source_dir: examples/topologies
    category: Inter-section Routing
    description:
      "The same below-a-row feeder reaching a section several columns away
      through its `entry: top` port. The leg carries the full width past the
      box's right side, rises above it, and returns over the top into the port
      without ever entering the interior."

pipelines:
  - id: rnaseq_auto
    title: nf-core/rnaseq
    repo_url: https://github.com/nf-core/rnaseq
    description:
      RNA-seq analysis with multiple aligner and quantification routes (STAR/RSEM,
      STAR/Salmon, HISAT2, Salmon pseudo-alignment, Kallisto).
  - id: sarek_metro
    title: nf-core/sarek
    repo_url: https://github.com/nf-core/sarek
    description:
      Germline and somatic variant calling, covering germline, tumor-only, and tumor-normal
      paired analysis through SNP/indel, SV/CNV, and MSI callers with downstream variant annotation.
  - id: epitopeprediction
    title: nf-core/epitopeprediction
    repo_url: https://github.com/nf-core/epitopeprediction
    description:
      MHC binding prediction from VCF, protein FASTA, or peptide TSV inputs through
      five prediction tools.
  - id: hlatyping
    title: nf-core/hlatyping
    repo_url: https://github.com/nf-core/hlatyping
    description: HLA typing from FASTQ or BAM inputs via OptiType and HLA-HD.
  - id: variantprioritization
    title: nf-core/variantprioritization
    repo_url: https://github.com/nf-core/variantprioritization
    description: Somatic and germline variant prioritization using PCGR and CPSR.
  - id: variantbenchmarking
    title: nf-core/variantbenchmarking
    repo_url: https://github.com/nf-core/variantbenchmarking
    description:
      Benchmarking of variant callers against truth sets with Truvari, hap.py, RTGtools,
      and more.
  - id: genomeassembly
    title: sanger-tol/genomeassembly
    repo_url: https://github.com/sanger-tol/genomeassembly
    description:
      Genome assembly from long reads and Hi-C data through purging, polishing, scaffolding,
      and QC.
  - id: seqinspector
    title: nf-core/seqinspector
    repo_url: https://github.com/nf-core/seqinspector
    description:
      Dedicated QC-only pipeline for sequencing data, running FASTQ, BAM, and run-folder
      QC tools in parallel and aggregating everything into a MultiQC report.

# Stems rendered for the CI render-diff only (not shown on gallery/pipelines pages).
# These supplement the auto-discovered guide/*.mmd and tests/fixtures/nextflow/*.mmd globs.
render_only:
  # Stems from examples/ rendered into the "Guide Examples" render-diff section.
  # rnaseq_sections_manual is the manually-gridded companion to rnaseq_auto.
  guide_examples:
    - rnaseq_auto
    - variantbenchmarking
    - variantbenchmarking_auto
    - marker_styles
    - rnaseq_sections_manual
  # Hand-tuned Nextflow DAG conversions from examples/; output name differs from stem.
  nextflow_conversions:
    - { id: variant_calling, output: nf_variant_calling_tuned }
    - { id: variant_calling_tuned, output: nf_variant_calling_tuned_icons }
  # Stems from tests/fixtures/ rendered into the "Test Fixtures" render-diff section.
  test_fixtures:
    - multiline_labels
    - rnaseq_simple
    - genomeassembly_organellar
    - target_entry_runway_bypass
    - tb_exit_terminal_on_carrier
